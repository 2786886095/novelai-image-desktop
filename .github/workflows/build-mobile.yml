name: Build Mobile

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Needed for softprops/action-gh-release to create/attach to Releases on v* tags.
permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # Sign the release APK with a STABLE key (from repo secrets) so every
      # published version installs over the previous one. If the secrets aren't
      # set, this no-ops and the build falls back to the debug key (build.gradle).
      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — release APK uses the debug key, so in-place updates will still conflict. Add the keystore secrets to fix."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          echo "Release signing configured with a stable key."

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: novelai-mobile-android-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/RELEASE_NOTES.md
          files: mobile/build/app/outputs/flutter-apk/app-release.apk

  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # No Apple Developer cert in CI: build without code signing. The resulting
      # .app is packaged into an UNSIGNED .ipa that cannot be installed on a
      # stock device without sideloading tools — for testing / archival only.
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr ../../../novelai-mobile-unsigned.ipa Payload
          cd -
          ls -lh novelai-mobile-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: novelai-mobile-ios-ipa-unsigned
          path: mobile/novelai-mobile-unsigned.ipa
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/RELEASE_NOTES.md
          files: mobile/novelai-mobile-unsigned.ipa
