name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Force bundled JS actions onto Node 24 (silences the Node 20 deprecation notice).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
            artifacts: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            name: windows
            artifacts: |
              release/*.exe
          - os: ubuntu-latest
            name: linux
            artifacts: |
              release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (${{ matrix.name }})
        run: npm run build && npx electron-builder --publish never
        env:
          # No signing certs in CI — skip macOS code signing / notarization.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novelai-image-desktop-${{ matrix.name }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
